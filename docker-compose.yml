services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studyagent
      POSTGRES_USER: studyagent
      POSTGRES_PASSWORD: studyagent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyagent -d studyagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    profiles:
      - rag

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://studyagent:studyagent@postgres:5432/studyagent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MATERIAL_UPLOAD_DIR: ${MATERIAL_UPLOAD_DIR:-/app/storage/materials}
      CHROMA_PERSIST_DIR: ${CHROMA_PERSIST_DIR:-/app/storage/chroma}
    ports:
      - "8000:8000"
    volumes:
      - backend-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://studyagent:studyagent@postgres:5432/studyagent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MATERIAL_UPLOAD_DIR: ${MATERIAL_UPLOAD_DIR:-/app/storage/materials}
      CHROMA_PERSIST_DIR: ${CHROMA_PERSIST_DIR:-/app/storage/chroma}
    volumes:
      - backend-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
  chroma-data:
  backend-storage:
